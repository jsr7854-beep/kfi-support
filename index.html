  <!-- 자동 업데이트 버전 체크 -->
  <script>
    (function() {
      const CURRENT_VERSION = '20260310-006'; // 배포할 때마다 변경
      const CHECK_KEY = 'kfi_last_version_check';
      const now = Date.now();
      const lastCheck = parseInt(localStorage.getItem(CHECK_KEY) || '0');
      // 1시간에 한 번만 체크 (과도한 요청 방지)
      if (now - lastCheck < 60 * 60 * 1000) return;
      localStorage.setItem(CHECK_KEY, now);
      fetch('./version.json?t=' + now, { cache: 'no-store' })
        .then(r => r.json())
        .then(data => {
          if (data.version && data.version !== CURRENT_VERSION) {
            console.log('[KFI] 새 버전 감지:', data.version, '→ 새로고침');
            caches.keys().then(names => Promise.all(names.map(n => caches.delete(n))))
              .finally(() => location.reload(true));
          }
        })
        .catch(() => {}); // 오프라인이거나 version.json 없으면 무시
    })();
  </script>

  <!-- PWA 서비스워커 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // 인라인 서비스워커 (별도 파일 불필요)
        const swCode = `
          const CACHE_NAME = 'kfi-v1';
          const CACHE_URLS = ['./', './index.html'];
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(CACHE_URLS)).then(() => self.skipWaiting()));
          });
          self.addEventListener('activate', e => {
            e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))).then(() => self.clients.claim()));
          });
          self.addEventListener('fetch', e => {
            // version.json은 항상 네트워크에서 (캐시 금지)
            if (e.request.url.includes('version.json')) {
              e.respondWith(fetch(e.request, { cache: 'no-store' }).catch(() => new Response('{}', {headers:{'Content-Type':'application/json'}})));
              return;
            }
            // Firebase/CDN은 네트워크 우선
            if (e.request.url.includes('firebase') || e.request.url.includes('cdnjs') || e.request.url.includes('cdn.tailwind')) {
              e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
              return;
            }
            // 나머지는 캐시 우선
            e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl)
          .then(reg => console.log('[KFI] SW 등록:', reg.scope))
          .catch(err => console.log('[KFI] SW 실패:', err));
      });
    }
  </script>

      logVisit: async (userType, deviceId) => {
        try {
          const today = new Date().toISOString().slice(0, 10);
          const statRef = db.collection("visitStats").doc(today);
          const statSnap = await statRef.get();
          let isUniqueToday = true;
          if (statSnap.exists) {
            const devices = statSnap.data().devices || [];
            isUniqueToday = !devices.includes(deviceId);
          }

          await db.collection("visits").add({
            userType, deviceId,
            visitedAt: new Date().toISOString(),
            date: today,
            isUnique: isUniqueToday
          });

          if (statSnap.exists) {
            const d = statSnap.data();
            const updateData = {
              total: (d.total || 0) + 1,
              [userType]: (d[userType] || 0) + 1,
              updatedAt: new Date().toISOString()
            };
            if (isUniqueToday) {
              updateData.unique = (d.unique || 0) + 1;
              updateData[`unique_${userType}`] = (d[`unique_${userType}`] || 0) + 1;
              updateData.devices = [...(d.devices || []), deviceId];
            }
            await statRef.update(updateData);
          } else {
            await statRef.set({
              date: today, total: 1, unique: 1,
              [userType]: 1, [`unique_${userType}`]: 1,
              devices: [deviceId],
              updatedAt: new Date().toISOString()
            });
          }
        } catch(e) {}
      },

    const getTodayKST = () => {
      const now = new Date();
      // KST = UTC+9, 날짜 비교용으로 시간 제거
      const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
      return new Date(kst.toISOString().slice(0, 10));
    };
    const TODAY = getTodayKST();
    
    const calculateDday = (deadline) => {
      if (!deadline || deadline === "상시" || deadline === "수시" || deadline === "연중상시") return null;
      // 다양한 날짜 포맷 처리: "2025.12.31", "2025-12-31", "2025년 12월 31일"
      let normalized = deadline
        .replace(/년\s*/g, '-').replace(/월\s*/g, '-').replace(/일/g, '')
        .replace(/\./g, '-').trim();
      // "2025-12-31 18:00" → "2025-12-31"
      normalized = normalized.split(' ')[0];
      const deadlineDate = new Date(normalized);
      if (isNaN(deadlineDate.getTime())) return null;
      const diffTime = deadlineDate - TODAY;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      return diffDays;
    };

      return `D-${dday}`;

    const getDdayColor = (dday) => { 
      if (dday === null) return "bg-blue-100 text-blue-700"; 
      if (dday < 0) return "bg-gray-200 text-gray-500";

      if (dday <= 7) return "bg-amber-100 text-amber-600";

      }; 
      return messages[errorCode] || '오류가 발생했습니다.';

    const AppSearchBar = ({ onQueryChange, resetKey, currentQuery }) => {
      const [val, setVal] = React.useState(currentQuery || '');

      }, [resetKey]);

      // 부모 searchQuery가 외부에서 초기화되면 동기화
      React.useEffect(() => {

      const doSearch = (v) => {

      };

      const handleSave = async () => {
        const data = {
          title, category, subcategory, status, amount, openDate, deadline,
          description, target, applyUrl,
          contact: { dept: contactDept, phone: contactPhone, email: contactEmail },
          details: details.filter(d => d.item.trim() || d.value.trim()),
          documents: documents.filter(d => d.trim()),
        };

        await onSave(data);
        setSaving(false);

              <option value="closed">마감</option>
            </select>
            <input placeholder="공고 시작일 (예: 2026-01-01)" value={openDate} onChange={e=>setOpenDate(e.target.value)} className={ic} />
            <input placeholder="접수 마감일 (예: 2026-09-30 또는 상시)" value={deadline} onChange={e=>setDeadline(e.target.value)} className={ic} />

            <p className="text-xs font-bold text-slate-500 mt-2">지원 내용</p>
            <input placeholder="지원금액 (예: 최대 500만원)" value={amount} onChange={e=>setAmount(e.target.value)} className={ic} />
            <textarea placeholder="사업 설명" value={description} onChange={e=>setDescription(e.target.value)} rows="3" className={ic} />
            <textarea placeholder="지원대상" value={target} onChange={e=>setTarget(e.target.value)} rows="2" className={ic} />

            <p className="text-xs font-bold text-slate-500 mt-2">지원 상세 항목 (항목명 / 내용)</p>
            {details.map((d, i) => (
              <div key={i} className="flex gap-1">
                <input placeholder="항목명" value={d.item} onChange={e=>{ const n=[...details]; n[i]={...n[i],item:e.target.value}; setDetails(n); }} className="border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 flex-1" />
                <input placeholder="내용" value={d.value} onChange={e=>{ const n=[...details]; n[i]={...n[i],value:e.target.value}; setDetails(n); }} className="border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 flex-1" />
                <button type="button" onClick={()=>setDetails(details.filter((_,j)=>j!==i))} className="px-2 text-red-400 text-lg">×</button>
              </div>
            ))}
            <button type="button" onClick={()=>setDetails([...details,{item:'',value:''}])} className="text-xs text-blue-600 font-semibold">+ 항목 추가</button>

            <p className="text-xs font-bold text-slate-500 mt-2">제출 서류</p>
            {documents.map((d, i) => (
              <div key={i} className="flex gap-1">
                <input placeholder="서류명" value={d} onChange={e=>{ const n=[...documents]; n[i]=e.target.value; setDocuments(n); }} className="border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 flex-1" />
                <button type="button" onClick={()=>setDocuments(documents.filter((_,j)=>j!==i))} className="px-2 text-red-400 text-lg">×</button>
              </div>
            ))}
            <button type="button" onClick={()=>setDocuments([...documents,''])} className="text-xs text-blue-600 font-semibold">+ 서류 추가</button>

            <p className="text-xs font-bold text-slate-500 mt-2">문의처</p>
            <input placeholder="부서명 (예: 산업진흥센터)" value={contactDept} onChange={e=>setContactDept(e.target.value)} className={ic} />
            <input placeholder="전화번호 (예: 031-289-0000)" value={contactPhone} onChange={e=>setContactPhone(e.target.value)} className={ic} />
            <input placeholder="이메일" value={contactEmail} onChange={e=>setContactEmail(e.target.value)} className={ic} />

            <p className="text-xs font-bold text-slate-500 mt-2">신청 URL</p>
            <input placeholder="신청 URL (https://...)" value={applyUrl} onChange={e=>setApplyUrl(e.target.value)} className={ic} />
          </div>
          <div className="flex gap-2 mt-4">
            <button type="button" onClick={onCancel} className="flex-1 py-3 rounded-xl bg-slate-200 text-sm font-semibold text-slate-700">취소</button>
            <button type="button" onClick={handleSave} disabled={saving} className="flex-1 py-3 rounded-xl bg-slate-800 text-white text-sm font-semibold disabled:opacity-50">
              {saving ? '저장중...' : initial ? '수정 저장' : '추가 저장'}
            </button>
          </div>
        </div>
      );
    };

    function App() {
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [userType, setUserType] = useState(null); // null | 'general' | 'manufacturer' | 'admin'
      const [isAdmin, setIsAdmin] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [showAdminLogin, setShowAdminLogin] = useState(false);
      const [programs, setPrograms] = useState(window.defaultPrograms || []);
      const [exhibitions, setExhibitions] = useState([]);
      const [allUsers, setAllUsers] = useState([]);
      const [userApplications, setUserApplications] = useState([]);
      const [allApplications, setAllApplications] = useState([]);
      const [visitStats, setVisitStats] = useState([]);
      const [bookmarks, setBookmarks] = useState([]);
      const [notifications, setNotifications] = useState([]);
      const [currentPage, setCurrentPage] = useState('home');
      const [selectedProgram, setSelectedProgram] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchBarKey, setSearchBarKey] = useState(0);
      const clearSearch = React.useCallback(() => { setSearchQuery(''); setSearchBarKey(k => k+1); }, []);
      const [selectedCategory, setSelectedCategory] = useState('전체');
      const [activeModal, setActiveModal] = useState(null);
      const [reviewModal, setReviewModal] = useState(null);
      const [adminFilter, setAdminFilter] = useState('전체');
      const [statusFilter, setStatusFilter] = useState('전체');
      const [showNotifications, setShowNotifications] = useState(false);
      const [showPreferences, setShowPreferences] = useState(false);
      const [userPreferences, setUserPreferences] = useState({ targetTags: [], subcategories: [] });
      const [refreshing, setRefreshing] = useState(false);
      const [showSplash, setShowSplash] = useState(true);
      const [showChatbot, setShowChatbot] = useState(false);
      const [chatMessages, setChatMessages] = useState([
        { role: 'bot', text: '안녕하세요! KFI 지원사업 챗봇입니다. 무엇을 도와드릴까요?' }
      ]);
      const [programsLoading, setProgramsLoading] = useState(false);
      // 사업관리 폼 상태 - App 최상위에서 관리 (탭 전환 시 초기화 방지)
      const [showProgramForm, setShowProgramForm] = useState(false);
      const [editProg, setEditProg] = useState(null);
      const [adminTab, setAdminTab] = useState('dashboard');
      const [notificationsEnabled, setNotificationsEnabled] = useState(() => {
        try { return localStorage.getItem('kfi_notif_enabled') !== 'false'; } catch { return true; }
      });
      const [dismissedNotifs, setDismissedNotifs] = useState(() => {
        try { return JSON.parse(localStorage.getItem('kfi_dismissed_notifs') || '[]'); } catch { return []; }
      });
      const [showExhibitionForm, setShowExhibitionForm] = useState(false);
      const [editExhibition, setEditExhibition] = useState(null);

      useEffect(() => { const h = () => setFirebaseReady(true); window.addEventListener('firebaseReady', h); if (window.firebaseAPI) setFirebaseReady(true); return () => window.removeEventListener('firebaseReady', h); }, []);

      // 검색 쿼리는 AppSearchBar에서 직접 setSearchQuery 호출

      // 관리자 Firebase 인증 상태
      useEffect(() => {
        if (!firebaseReady) return;
        return window.firebaseAPI.onAuthChange(async (user) => {
          if (user) {
            // Firebase Auth 로그인 성공 = 관리자 (관리자 계정만 등록 전제)
            const r = await window.firebaseAPI.getUserProfile(user.uid);
            const profileData = (r.success && r.data) ? r.data : { uid: user.uid, name: '관리자', company: 'KFI', isAdmin: true };
            setCurrentUser(user);
            setUserProfile(profileData);
            setIsAdmin(true);
            setUserType('admin');
          } else {
            setCurrentUser(null);
            setUserProfile(null);
            setIsAdmin(false);
            if (isAdmin) setUserType(null);
          }
        });
      }, [firebaseReady]);

      useEffect(() => {
        if (!firebaseReady) return;
        return window.firebaseAPI.subscribePrograms((p) => { setPrograms(p); setProgramsLoading(false); });
      }, [firebaseReady]);
      useEffect(() => { if (!firebaseReady) return; return window.firebaseAPI.subscribeExhibitions(setExhibitions); }, [firebaseReady]);
      useEffect(() => { if (!firebaseReady || !isAdmin) return; return window.firebaseAPI.subscribeUsers(setAllUsers); }, [firebaseReady, isAdmin]);
      useEffect(() => { if (!firebaseReady || !isAdmin) return; return window.firebaseAPI.subscribeAllApplications(setAllApplications); }, [firebaseReady, isAdmin]);
      useEffect(() => { if (!firebaseReady || !isAdmin) return; return window.firebaseAPI.subscribeVisitStats(setVisitStats); }, [firebaseReady, isAdmin]);
      useEffect(() => { if (!firebaseReady || isAdmin) return; 
        const uid = getOrCreateDeviceId();
        return window.firebaseAPI.subscribeUserApplications(uid, setUserApplications); 
      }, [firebaseReady, isAdmin]);

      // 알림 데이터 생성 (개선: 읽음처리, 중복방지, 활성화 토글)
      useEffect(() => {
        if (!programs.length || !notificationsEnabled) { setNotifications([]); return; }
        const notifs = [];
        programs.forEach(p => {
          const dday = calculateDday(p.deadline);
          if (dday !== null && dday >= 0 && dday <= 7) {
            const id = `deadline-${p.id}-${p.deadline}`;
            if (!dismissedNotifs.includes(id)) {
              notifs.push({ id, type: 'deadline', title: dday === 0 ? '오늘 마감!' : `마감 ${dday}일 전`, message: p.title, programId: p.id, createdAt: new Date().toISOString() });
            }
          }
        });
        // 신규 알림: 공고일 기준 7일 이내 오픈 사업만 (항상 뜨는 버그 수정)
        const recentNew = programs.filter(p => {
          if (p.status !== 'open' || !p.openDate) return false;
          const openDate = new Date(p.openDate);
          const diffDays = Math.floor((TODAY - openDate) / (1000*60*60*24));
          return diffDays >= 0 && diffDays <= 7;
        }).slice(0, 3);
        recentNew.forEach(p => {
          const id = `new-${p.id}-${p.openDate}`;
          if (!dismissedNotifs.includes(id)) {
            notifs.push({ id, type: 'new', title: '신규 지원사업', message: p.title, programId: p.id, createdAt: new Date().toISOString() });
          }
        });
        setNotifications(notifs);
      }, [programs, notificationsEnabled, dismissedNotifs]);

      const dismissNotification = (id, e) => {
        e?.stopPropagation();
        const updated = [...dismissedNotifs, id];
        setDismissedNotifs(updated);
        try { localStorage.setItem('kfi_dismissed_notifs', JSON.stringify(updated)); } catch {}
      };
      const toggleNotificationsEnabled = (val) => {
        setNotificationsEnabled(val);
        try { localStorage.setItem('kfi_notif_enabled', String(val)); } catch {}
      };

      const toggleBookmark = async (id, e) => {
        e?.stopPropagation();
        const newBookmarks = bookmarks.includes(id) ? bookmarks.filter(b => b !== id) : [...bookmarks, id];
        setBookmarks(newBookmarks);
        if (currentUser) await window.firebaseAPI.updateBookmarks(currentUser.uid, newBookmarks);
        // 로컬 스토리지에도 저장 (비로그인 사용자)
        try { localStorage.setItem('kfi_bookmarks', JSON.stringify(newBookmarks)); } catch(e) {}
      };

      // 북마크 로컬 복원
      useEffect(() => {
        try { const saved = localStorage.getItem('kfi_bookmarks'); if (saved) setBookmarks(JSON.parse(saved)); } catch(e) {}
      }, []);
      
      const submitApplication = async (program) => {
        try {
          const deviceId = getOrCreateDeviceId();
          const r = await window.firebaseAPI.submitApplication({
            userId: currentUser?.uid || deviceId,
            userEmail: currentUser?.email || userType + '@kfi.user',
            userName: userProfile?.name || (userType === 'manufacturer' ? '제조업체 사용자' : '일반 사용자'),
            userCompany: userProfile?.company || '미등록',
            programId: program.id || program.docId,
            programTitle: program.title,
            programCategory: program.category
          });
          if (r.success) {
            alert('신청이 완료되었습니다!\n\n관리자 검토 후 결과를 알려드립니다.');
            setSelectedProgram(null);
          } else { alert('신청 중 오류가 발생했습니다.\n다시 시도해주세요.'); }
        } catch (error) { alert('신청 중 오류가 발생했습니다.'); }
      };
      
      const handleLogout = async () => {
        if (isAdmin) {
          await window.firebaseAPI.signOut();
          setCurrentUser(null); setUserProfile(null); setIsAdmin(false);
        }
        setUserType(null);
        setCurrentPage('home');
        setActiveModal(null);
      };

      // ===== 사업관리 CRUD 핸들러 (App 레벨 - 탭 전환해도 상태 유지) =====
      const handleSaveProgram = async (data) => {
        if (!data.title.trim()) { alert('사업명을 입력하세요.'); return; }
        try {
          if (editProg) {
            const docId = editProg.docId || String(editProg.id);
            const result = await window.firebaseAPI.updateProgram(docId, data);
            if (result.success) { alert('수정되었습니다.'); }
            else { alert('수정 중 오류가 발생했습니다.'); return; }
          } else {
            const result = await window.firebaseAPI.addProgram(data);
            if (result.success) { alert('새 사업이 추가되었습니다.'); }
            else { alert('추가 중 오류가 발생했습니다.'); return; }
          }
          setShowProgramForm(false);
          setEditProg(null);
        } catch(e) {
          alert('저장 중 오류가 발생했습니다.');
        }
      };

      const handleEditProg = (p) => {
        setEditProg(p);
        setShowProgramForm(true);
        setAdminTab('programs');
      };

      const handleDeleteProg = async (p) => {
        if (!confirm(`"${p.title}"\n\n삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
        const docId = p.docId || String(p.id);
        const result = await window.firebaseAPI.deleteProgram(docId);
        if (result.success) {
          alert('삭제되었습니다.');
        } else {
          alert('삭제 중 오류가 발생했습니다.');
        }
      };

      const handleCancelProgramForm = () => {
        setShowProgramForm(false);
        setEditProg(null);
      };

      const savePreferences = async () => {
        if (currentUser) {
          await window.firebaseAPI.updateUserProfile(currentUser.uid, { preferences: userPreferences });
        }
        try { localStorage.setItem('kfi_prefs', JSON.stringify(userPreferences)); } catch(e) {}
        alert('맞춤 설정이 저장되었습니다.');
        setShowPreferences(false);
      };

      const handleRefresh = async () => {
        setRefreshing(true);
        // 데이터 새로고침 시뮬레이션
        await new Promise(resolve => setTimeout(resolve, 1000));
        setRefreshing(false);
      };

      // 스플래시 화면 타이머
      useEffect(() => {
        const timer = setTimeout(() => setShowSplash(false), 2500);
        return () => clearTimeout(timer);
      }, []);

      // 챗봇 응답 로직
      const chatbotResponses = {
        '특허': '특허 관련 지원사업으로는 "국내외 특허 출원·등록 경비 지원"이 있습니다. 최대 500만원까지 지원받으실 수 있으며, 국내특허 출원 100만원, 등록 100만원, 해외특허 출원 200만원, 등록 300만원을 지원합니다.',
        '해외': '해외 진출 관련 지원사업으로는 해외인증 획득 지원(최대 70%), 해외전시회 참가 지원, 수출상담회 개최 등이 있습니다. 자세한 내용은 지원사업 목록에서 확인해주세요.',
        '신청': '지원사업 신청은 홈 화면에서 원하시는 지원사업을 선택한 후 "신청하기" 버튼을 클릭하시면 됩니다. 필요 서류는 각 사업별 상세 페이지에서 확인하실 수 있습니다.',
        '마감': '마감 임박 지원사업은 홈 화면 "마감 임박" 섹션에서 확인하실 수 있습니다. D-day가 표시되어 마감일까지 남은 일수를 쉽게 확인하실 수 있습니다.',
        '문의': '문의사항은 산업진흥센터 031-289-0000으로 연락주시거나, support@kfi.or.kr로 이메일을 보내주세요. 평일 09:00~18:00에 상담 가능합니다.',
        '금융': '금융 지원사업으로는 "소방산업체 금융 경비 지원"(HP보증보험료 50%, 연 50만원 한도)과 "지식재산(IP) 금융 지원사업"(IP 대출 2% 이자 지원, 최대 300만원)이 있습니다.',
        '전시회': '해외전시회 참가 지원사업을 통해 국제 소방전시회 참가비와 부스비를 지원받으실 수 있습니다. 전시회별 공고를 확인해주세요.',
        '자격': '지원 자격은 사업별로 다릅니다. 일반적으로 통계청 산업특수분류에 의한 소방산업 종사자 및 기업(단체)이 대상입니다. 각 사업 상세페이지에서 정확한 자격요건을 확인해주세요.',
        '서류': '일반적으로 지원신청서, 사업자등록증, 관련 증빙서류가 필요합니다. 사업별로 필요 서류가 다르니 상세페이지를 확인해주세요.',
        '안녕': '안녕하세요! KFI 지원사업 챗봇입니다. 지원사업에 대해 궁금한 점이 있으시면 편하게 질문해주세요.',
        '도움': '다음 키워드로 질문해보세요: 특허, 해외, 신청, 마감, 문의, 금융, 전시회, 자격, 서류'
      };

      const handleQuickChat = (msg) => {
        setChatMessages(prev => [...prev, { role: 'user', text: msg }]);
        setTimeout(() => {
          let response = '죄송합니다. 해당 질문에 대한 답변을 찾지 못했습니다.';
          for (const [keyword, answer] of Object.entries(chatbotResponses)) {
            if (msg.includes(keyword)) { response = answer; break; }
          }
          setChatMessages(prev => [...prev, { role: 'bot', text: response }]);
        }, 500);
      };

      // 프로그램에 D-day 추가
      const programsWithDday = useMemo(() => {
        return programs.map(p => ({
          ...p,
          dday: calculateDday(p.deadline),
          isClosed: p.status === 'closed' || (calculateDday(p.deadline) !== null && calculateDday(p.deadline) < 0)
        }));
      }, [programs]);

      const filteredPrograms = useMemo(() => {
        const query = searchQuery.toLowerCase().trim();
        return programsWithDday.filter(p => {
          // 검색어가 없으면 카테고리 필터만 적용
          if (!query) {
            return selectedCategory === '전체' || p.category === selectedCategory;
          }
          // 검색어가 있으면 여러 필드에서 검색
          const searchFields = [
            p.title,
            p.category,
            p.subcategory,
            p.description,
            ...(p.targetTags || [])
          ].filter(Boolean).join(' ').toLowerCase();
          
          const matchesSearch = searchFields.includes(query);
          const matchesCategory = selectedCategory === '전체' || p.category === selectedCategory;
          return matchesSearch && matchesCategory;
        });
      }, [programsWithDday, searchQuery, selectedCategory]);

      const matchedPrograms = useMemo(() => {
        if (!userPreferences.targetTags?.length && !userPreferences.subcategories?.length) return [];
        return programsWithDday.filter(p => {
          const tagMatch = userPreferences.targetTags?.some(tag => p.targetTags?.includes(tag));
          const subMatch = userPreferences.subcategories?.some(sub => p.subcategory === sub);
          return (tagMatch || subMatch) && !p.isClosed;
        });
      }, [programsWithDday, userPreferences]);

      const filteredAdminApps = useMemo(() => { 
        if (adminFilter === '전체') return allApplications; 
        if (adminFilter === '검토대기') return allApplications.filter(a => a.status === 'submitted'); 
        if (adminFilter === '심사중') return allApplications.filter(a => a.status === 'reviewing'); 
        return allApplications.filter(a => ['approved','rejected'].includes(a.status)); 
      }, [allApplications, adminFilter]);
      
      const filteredUserApps = useMemo(() => { 
        if (statusFilter === '전체') return userApplications; 
        if (statusFilter === '진행중') return userApplications.filter(a => ['submitted','reviewing'].includes(a.status)); 
        if (statusFilter === '완료') return userApplications.filter(a => ['approved'].includes(a.status)); 
        return userApplications.filter(a => a.status === 'rejected'); 
      }, [userApplications, statusFilter]);
      
      const urgentPrograms = programsWithDday.filter(p => p.dday !== null && p.dday >= 0 && p.dday <= 14 && !p.isClosed).sort((a, b) => a.dday - b.dday).slice(0, 5);

      // 로그인 페이지 (일반/관리자 구분)
      // 프리퍼런스 로컬 복원
      useEffect(() => {
        try { const saved = localStorage.getItem('kfi_prefs'); if (saved) setUserPreferences(JSON.parse(saved)); } catch(e) {}
      }, []);

      // 신청현황 (Pull to Refresh)
      const StatusPage = () => {
        const [pullY, setPullY] = useState(0);
        const THRESHOLD = 80;

        const handleTouchStart = (e) => { window._touchStartY = e.touches[0].clientY; };
        const handleTouchMove = (e) => {
          if (!window._touchStartY) return;
          const delta = e.touches[0].clientY - window._touchStartY;
          if (delta > 0) setPullY(Math.min(delta, THRESHOLD + 20));
        };
        const handleTouchEnd = async () => {
          if (pullY >= THRESHOLD && !refreshing) { await handleRefresh(); }
          setPullY(0);
          window._touchStartY = null;
        };
        const pullProgress = Math.min(pullY / THRESHOLD, 1);

        return (
          <div className="pb-24 px-4 py-4 animate-fade-in" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
            {/* 당기기 인디케이터 (개선5) */}
            <div className="flex justify-center overflow-hidden transition-all" style={{ height: pullY > 0 ? pullY * 0.6 : 0 }}>
              <div className={`flex items-center gap-2 text-sm transition-all ${pullProgress >= 1 ? 'text-blue-600' : 'text-slate-400'}`} style={{ opacity: pullProgress }}>
                <div className={`w-5 h-5 border-2 rounded-full transition-all ${pullProgress >= 1 ? 'border-blue-500 border-t-transparent animate-spin' : 'border-slate-300'}`} />
                {pullProgress >= 1 ? '놓으면 새로고침' : '당겨서 새로고침'}

            </div>

            <div className="flex gap-2 mb-4 overflow-x-auto hide-scrollbar">

                <button key={f} onClick={() => setStatusFilter(f)} className={`px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap ${statusFilter === f ? 'bg-slate-800 text-white' : 'bg-white'}`}>{f}</button>
              ))}
            </div>
            <div className="space-y-3">

                <div className="bg-white rounded-2xl p-10 text-center shadow-sm">

                </div>

                  <div key={app.docId} className="bg-white rounded-2xl p-5 shadow-sm">
                    <span className={`px-3 py-1 rounded-full text-xs font-semibold ${getStatusBadge(app.status).class}`}>{getStatusBadge(app.status).text}</span>

                    {app.reviewNote && <p className="text-sm text-red-500 mt-2">💬 {app.reviewNote}</p>}

      // ===== 관리자 대시보드 =====

        const [location, setLocation] = useState(initial?.location || '');
        const [country, setCountry] = useState(initial?.country || '');
        const [startDate, setStartDate] = useState(initial?.startDate || '');
        const [endDate, setEndDate] = useState(initial?.endDate || '');
        const [color, setColor] = useState(initial?.color || 'from-slate-600 to-slate-400');
        const [saving, setSaving] = useState(false);
        const ic = 'w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400';
        const colorOptions = [
          { label: '청록', value: 'from-teal-600 to-teal-400' },
          { label: '보라', value: 'from-purple-600 to-purple-400' },
          { label: '빨강', value: 'from-red-600 to-red-400' },
          { label: '파랑', value: 'from-blue-600 to-blue-400' },
          { label: '초록', value: 'from-emerald-600 to-emerald-400' },
          { label: '남색', value: 'from-indigo-600 to-indigo-400' },
        ];
        const handleSave = async () => {
          if (!name.trim() || !startDate) { alert('전시회명과 시작일은 필수입니다.'); return; }
          setSaving(true);
          await onSave({ name, location, country, startDate, endDate, color });
          setSaving(false);

        return (
          <div className="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-4">
            <h4 className="font-bold mb-3">{initial ? '✏️ 전시회 수정' : '➕ 전시회 추가'}</h4>
            <div className="space-y-2">
              <input placeholder="전시회명 *" value={name} onChange={e=>setName(e.target.value)} className={ic} />

              <input placeholder="장소 (예: 미국 시카고)" value={location} onChange={e=>setLocation(e.target.value)} className={ic} />

                <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} className={ic + ' flex-1'} />
                <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className={ic + ' flex-1'} />
              </div>
              <div>
                <p className="text-xs font-semibold text-slate-500 mb-1">카드 색상</p>
                <div className="flex gap-2 flex-wrap">
                  {colorOptions.map(c => (
                    <button type="button" key={c.value} onClick={() => setColor(c.value)} className={`px-3 py-1 rounded-full text-xs font-semibold text-white bg-gradient-to-r ${c.value} ${color === c.value ? 'ring-2 ring-offset-1 ring-slate-800' : ''}`}>{c.label}</button>
                  ))}
                </div>
              </div>
            </div>
            <div className="flex gap-2 mt-3">
              <button type="button" onClick={onCancel} className="flex-1 py-2 rounded-xl bg-slate-100 text-sm font-semibold">취소</button>
              <button type="button" onClick={handleSave} disabled={saving} className="flex-1 py-2 rounded-xl bg-slate-800 text-white text-sm font-semibold disabled:opacity-50">{saving ? '저장중...' : '저장'}</button>
            </div>
          </div>
        );
      };

      const AdminDashboard = () => {
        const totalVisits = visitStats.reduce((s,d) => s+(d.total||0), 0);
        const totalUnique = visitStats.reduce((s,d) => s+(d.unique||0), 0);
        const todayStats = visitStats[0] || {};

          if (editExhibition) {
            result = await window.firebaseAPI.updateExhibition(editExhibition.docId || String(editExhibition.id), data);
          } else {
            result = await window.firebaseAPI.addExhibition(data);

          if (result.success) { setShowExhibitionForm(false); setEditExhibition(null); }

            <div className="flex bg-white border-b overflow-x-auto">

                <button key={t.id} onClick={() => setAdminTab(t.id)} className={`flex-1 py-3 text-sm font-semibold border-b-2 transition whitespace-nowrap px-3 ${adminTab===t.id ? 'border-slate-800 text-slate-900' : 'border-transparent text-slate-400'}`}>{t.label}</button>
              ))}
            </div>

            {adminTab === 'dashboard' && (
              <div className="px-4 py-5">
                {/* 알림 설정 */}
                <div className="bg-white rounded-2xl p-4 shadow-sm mb-5 flex items-center justify-between">
                  <div>
                    <p className="font-bold text-sm">🔔 사용자 알림</p>
                    <p className="text-xs text-slate-400 mt-0.5">{notificationsEnabled ? '마감 임박·신규 알림 활성화됨' : '알림이 꺼져있습니다'}</p>
                  </div>
                  <button type="button" onClick={() => toggleNotificationsEnabled(!notificationsEnabled)}
                    className={`relative w-12 h-6 rounded-full transition-colors ${notificationsEnabled ? 'bg-blue-600' : 'bg-slate-300'}`}>

                    <p className="text-2xl font-bold text-blue-700">{totalVisits.toLocaleString()}회</p>

                            <div className="h-full bg-blue-500 rounded-full" style={{width:`${Math.min((d.total||0)/Math.max(...visitStats.map(s=>s.total||1))*100,100)}%`}} />

            {adminTab === 'programs' && (
              <div className="px-4 py-5">

                  <h3 className="font-bold">지원사업 관리 ({programs.length}개)</h3>

                {showProgramForm && (
                  <ProgramEditForm
                    key={editProg ? (editProg.docId || editProg.id) : 'new'}
                    initial={editProg}
                    onSave={handleSaveProgram}
                    onCancel={handleCancelProgramForm}
                  />
                )}
                <div className="space-y-2">
                  {programs.map(p => (
                    <div key={p.docId||p.id} className="bg-white rounded-xl p-4 shadow-sm">
                      <div className="flex items-start gap-3">

                          <p className="font-semibold text-sm">{p.title}</p>
                          <div className="flex flex-wrap gap-1.5 mt-1">
                            <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold ${getCategoryColor(p.category)}`}>{p.category}</span>

                          <p className="text-xs text-slate-400 mt-1">{p.openDate ? `공고: ${p.openDate} ~ ` : ""}{p.deadline} · {p.amount}</p>

                        <div className="flex gap-1 flex-shrink-0">

                {showExhibitionForm && (
                  <ExhibitionEditForm
                    key={editExhibition ? (editExhibition.docId || editExhibition.id) : 'new-ex'}

                    onCancel={() => { setShowExhibitionForm(false); setEditExhibition(null); }}

                <div className="space-y-3">
                  {(exhibitions.length > 0 ? exhibitions : window.defaultExhibitions).map(ex => (

                        </div>
                      </div>
                    </div>

      const AdminStatusPage = () => (
        <div className="pb-24 px-4 py-4 animate-fade-in">

          <div className="flex gap-2 mb-4 overflow-x-auto hide-scrollbar">
            {['전체', '검토대기', '심사중', '완료'].map(f => (

                {f} ({f === '전체' ? allApplications.length : f === '검토대기' ? allApplications.filter(a => a.status === 'submitted').length : f === '심사중' ? allApplications.filter(a => a.status === 'reviewing').length : allApplications.filter(a => ['approved','rejected'].includes(a.status)).length})

        const titles = { profile: '내 정보', bookmark: '즐겨찾기', help: '문의하기', version: '버전 정보' }; 
        
        return (
          <div className="fixed inset-0 bg-black/50 z-50 flex items-end justify-center" onClick={() => setActiveModal(null)}>
            <div className="bg-white w-full max-h-[70vh] rounded-t-3xl overflow-hidden animate-slide-up" onClick={e => e.stopPropagation()}>
              <div className="p-5 border-b flex justify-between items-center"><h2 className="text-lg font-bold">{titles[activeModal]}</h2><button type="button" onClick={() => setActiveModal(null)} className="p-2"><Icon name="x" className="w-5 h-5" /></button></div>
              <div className="p-5 overflow-y-auto max-h-[50vh]">{content[activeModal]}</div>
            </div>
          </div>
        );
      };

      // 스플래시 화면
      const SplashScreen = () => (
        <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center" style={{ background: 'linear-gradient(180deg, #1e3a5f 0%, #2d4a6f 50%, #3d5a7f 100%)' }}>
          {/* KFI 로고 */}
          <div className="mb-8">
            <div className="w-20 h-20 rounded-full border-2 border-white/80 flex items-center justify-center">
              <span className="text-white text-2xl font-bold tracking-wider">KFI</span>
            </div>
          </div>
          
          {/* 메인 타이틀 */}
          <h1 className="text-white text-4xl font-bold mb-2">KFI</h1>
          <h2 className="text-white text-3xl font-bold mb-4">지원사업 비서</h2>
          <p className="text-white/80 text-lg mb-16">소방산업의 미래를 함께 합니다</p>
          
          {/* 아이콘 영역 */}
          <div className="relative w-48 h-48 mb-16">
            {/* 파란 톱니바퀴 - 왼쪽 하단 */}
            <svg className="absolute left-0 bottom-0 w-20 h-20 text-blue-500 opacity-80 animate-spin-slow" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66Z"/>
            </svg>
            
            {/* 불꽃 - 중앙 */}
            <svg className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-28 h-28" viewBox="0 0 24 24">
              <path fill="#ef4444" d="M12 23c-3.9 0-7-3.1-7-7 0-2.8 1.6-5.2 3.1-6.8.5-.5 1.4-.2 1.4.5v1.5c0 .6.4 1 1 1s1-.4 1-1V3c0-.6.5-1 1-1s1 .4 1 1v5c0 .6.4 1 1 1s1-.4 1-1V7c0-.7.9-1 1.4-.5C18.4 8.8 19 11.2 19 14c0 3.9-3.1 7-7 7z"/>
              <path fill="#fbbf24" d="M12 21c-2.2 0-4-1.8-4-4 0-1.6.9-3 1.8-3.9.3-.3.8-.1.8.3v.9c0 .3.2.6.6.6.3 0 .6-.2.6-.6V9c0-.3.3-.6.6-.6s.6.2.6.6v2.9c0 .3.2.6.6.6.3 0 .6-.2.6-.6v-1.5c0-.4.5-.6.8-.3.9.9 1.4 2.3 1.4 3.9 0 2.2-1.8 4-4 4z"/>
            </svg>
            
            {/* 회색 톱니바퀴 - 오른쪽 */}
            <svg className="absolute right-0 top-4 w-16 h-16 text-slate-400 opacity-70" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66Z"/>
            </svg>
          </div>
          
          {/* 시작하기 버튼 */}
          <button type="button" onClick={() => setShowSplash(false)} className="flex items-center gap-2 text-white text-lg font-medium animate-pulse">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
            시작하기
          </button>
        </div>
      );

      // 챗봇 모달
      const ChatbotModal = () => {
        const chatContainerRef = React.useRef(null);
        const modalRef = React.useRef(null);
        const hasAnimated = React.useRef(false);
        
        useEffect(() => {
          // 애니메이션 완료 후 클래스 제거
          if (showChatbot && modalRef.current && !hasAnimated.current) {
            const timer = setTimeout(() => {
              if (modalRef.current) {
                modalRef.current.style.animation = 'none';
                modalRef.current.style.transform = 'translateY(0)';
                modalRef.current.style.opacity = '1';
              }
              hasAnimated.current = true;
            }, 350);
            return () => clearTimeout(timer);
          }
        }, [showChatbot]);
        
        useEffect(() => {
          // 모달이 닫힐 때 애니메이션 상태 리셋
          if (!showChatbot) {
            hasAnimated.current = false;
          }
        }, [showChatbot]);
        
        useEffect(() => {
          // 부모 컨테이너 내에서만 스크롤 (setTimeout으로 DOM 업데이트 후 실행)
          if (chatContainerRef.current) {
            setTimeout(() => {
              if (chatContainerRef.current) {
                chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
              }
            }, 10);
          }
        }, [chatMessages]);
        
        if (!showChatbot) return null;

        const handleQuickQuestion = (q) => {
          setChatMessages(prev => [...prev, { role: 'user', text: q }]);
          setTimeout(() => {
            let response = '죄송합니다. 해당 질문에 대한 답변을 찾지 못했습니다.';
            for (const [keyword, answer] of Object.entries(chatbotResponses)) {
              if (q.includes(keyword)) { response = answer; break; }
            }
            setChatMessages(prev => [...prev, { role: 'bot', text: response }]);
          }, 500);
        };

        return (
          <div className="fixed inset-0 bg-black/50 z-50 flex items-end justify-center" onClick={() => setShowChatbot(false)}>
            <div 
              ref={modalRef}
              className="bg-white w-full max-w-lg h-[70vh] rounded-t-3xl overflow-hidden flex flex-col animate-slide-up"
              onClick={e => e.stopPropagation()}
            >
              {/* 헤더 */}
              <div className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-4 flex justify-between items-center">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <Icon name="messageCircle" className="w-5 h-5" />
                  </div>
                  <div>
                    <h2 className="font-bold">KFI 지원사업 챗봇</h2>
                    <p className="text-xs text-blue-100">무엇이든 물어보세요</p>
                  </div>
                </div>
                <button type="button" onClick={() => setShowChatbot(false)} className="p-2"><Icon name="x" className="w-5 h-5" /></button>
              </div>
              
              {/* 메시지 영역 */}
              <div ref={chatContainerRef} className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                {chatMessages.map((msg, i) => (
                  <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                    <div className={`max-w-[80%] rounded-2xl px-4 py-3 ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-white text-slate-800 rounded-bl-sm shadow-sm'}`}>
                      <p className="text-sm leading-relaxed">{msg.text}</p>
                    </div>
                  </div>
                ))}
              </div>
              
              {/* 빠른 질문 버튼 */}
              <div className="px-4 py-3 bg-slate-50 border-t flex gap-2 overflow-x-auto hide-scrollbar">
                {['특허 지원', '해외 진출', '신청 방법', '문의처'].map(q => (
                  <button type="button" key={q} onClick={() => handleQuickQuestion(q)} className="px-4 py-2 bg-white border border-slate-200 hover:bg-slate-100 active:bg-slate-200 rounded-full text-xs font-medium text-slate-700 whitespace-nowrap transition-colors shadow-sm">{q}</button>
                ))}
              </div>
              
              {/* 입력 영역 */}
              <div className="p-3 bg-white border-t flex gap-2 items-end">
                <input 
                  id="chatInputField"
                  type="text"
                  enterKeyHint="send"
                  defaultValue=""
                  onKeyDown={e => {
                    if (e.key === 'Enter' && !e.nativeEvent.isComposing) {
                      e.preventDefault();
                      const input = e.target;
                      const msg = input.value.trim();
                      if (msg) {
                        setChatMessages(prev => [...prev, { role: 'user', text: msg }]);
                        input.value = '';
                        setTimeout(() => {
                          let response = '죄송합니다. 해당 질문에 대한 답변을 찾지 못했습니다. "도움"을 입력하시면 사용 가능한 키워드를 안내해드립니다.';
                          for (const [keyword, answer] of Object.entries(chatbotResponses)) {
                            if (msg.includes(keyword)) { response = answer; break; }
                          }
                          setChatMessages(prev => [...prev, { role: 'bot', text: response }]);
                        }, 500);
                      }
                    }
                  }}
                  placeholder="질문을 입력하세요..." 
                  className="flex-1 px-4 py-3 bg-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 border-0"
                />
                <button type="button" onClick={() => {
                  const input = document.getElementById('chatInputField');
                  const msg = input?.value?.trim();
                  if (msg) {
                    setChatMessages(prev => [...prev, { role: 'user', text: msg }]);
                    input.value = '';
                    setTimeout(() => {
                      let response = '죄송합니다. 해당 질문에 대한 답변을 찾지 못했습니다. "도움"을 입력하시면 사용 가능한 키워드를 안내해드립니다.';
                      for (const [keyword, answer] of Object.entries(chatbotResponses)) {
                        if (msg.includes(keyword)) { response = answer; break; }
                      }
                      setChatMessages(prev => [...prev, { role: 'bot', text: response }]);
                    }, 500);
                  }
                }} className="w-11 h-11 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white rounded-full flex items-center justify-center transition-colors shadow-md">
                  <Icon name="send" className="w-5 h-5" />
                </button>
              </div>
            </div>
          </div>
        );
      };

      // 챗봇 FAB 버튼
      const ChatbotFAB = () => (
        <button 
          type="button"
          onClick={(e) => { e.preventDefault(); e.stopPropagation(); setShowChatbot(true); }} 
          className="fixed right-4 bottom-28 w-14 h-14 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-full shadow-xl flex items-center justify-center z-40 active:scale-95 transition-all hover:shadow-2xl"
          style={{ boxShadow: '0 4px 20px rgba(79, 70, 229, 0.4)' }}
        >
          <Icon name="messageCircle" className="w-7 h-7" />
        </button>
      );

      // 스플래시 화면 표시
      if (showSplash) return <SplashScreen />;

      if (!userType) return <UserTypeSelectPage />;

      return (
        <div className="min-h-screen bg-slate-100">
          <Header />
          <NotificationPanel />
          <main>
            {currentPage === 'home' && (isAdmin ? <AdminDashboard /> : <HomePage />)}
            {currentPage === 'calendar' && <CalendarPage />}
            {currentPage === 'mypage' && <MyPage />}
          </main>
          <BottomNav />
          <ChatbotFAB />
          <DetailModal />
          <MyPageModal />
          <ReviewModal />
          <PreferencesModal />
          <ChatbotModal />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
