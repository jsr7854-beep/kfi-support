  <!-- 자동 업데이트 버전 체크 -->
  <script>
    (function() {
      const CURRENT_VERSION = '20260312-001'; // 배포할 때마다 변경
      const CHECK_KEY = 'kfi_last_version_check';
      const now = Date.now();
      const lastCheck = parseInt(localStorage.getItem(CHECK_KEY) || '0');
      // 1시간에 한 번만 체크 (과도한 요청 방지)
      if (now - lastCheck < 60 * 60 * 1000) return;
      localStorage.setItem(CHECK_KEY, now);
      fetch('./version.json?t=' + now, { cache: 'no-store' })
        .then(r => r.json())
        .then(data => {
          if (data.version && data.version !== CURRENT_VERSION) {
            console.log('[KFI] 새 버전 감지:', data.version, '→ 새로고침');
            caches.keys().then(names => Promise.all(names.map(n => caches.delete(n))))
              .finally(() => location.reload(true));
          }
        })
        .catch(() => {}); // 오프라인이거나 version.json 없으면 무시
    })();
  </script>

  <!-- PWA 서비스워커 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // 인라인 서비스워커 (별도 파일 불필요)
        const swCode = `
          const CACHE_NAME = 'kfi-v1';
          const CACHE_URLS = ['./', './index.html'];
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(CACHE_URLS)).then(() => self.skipWaiting()));
          });
          self.addEventListener('activate', e => {
            e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))).then(() => self.clients.claim()));
          });
          self.addEventListener('fetch', e => {
            // version.json은 항상 네트워크에서 (캐시 금지)
            if (e.request.url.includes('version.json')) {
              e.respondWith(fetch(e.request, { cache: 'no-store' }).catch(() => new Response('{}', {headers:{'Content-Type':'application/json'}})));
              return;
            }
            // Firebase/CDN은 네트워크 우선
            if (e.request.url.includes('firebase') || e.request.url.includes('cdnjs') || e.request.url.includes('cdn.tailwind')) {
              e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
              return;
            }
            // 나머지는 캐시 우선
            e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl)
          .then(reg => console.log('[KFI] SW 등록:', reg.scope))
          .catch(err => console.log('[KFI] SW 실패:', err));
      });
    }
  </script>

            isAdmin: email === 'admin@kfi.or.kr'
          });
          return { success: true, user };

      logVisit: async (userType, deviceId) => {
        try {
          const today = new Date().toISOString().slice(0, 10);
          const statRef = db.collection("visitStats").doc(today);
          const statSnap = await statRef.get();
          let isUniqueToday = true;
          if (statSnap.exists) {
            const devices = statSnap.data().devices || [];
            isUniqueToday = !devices.includes(deviceId);
          }

          await db.collection("visits").add({
            userType, deviceId,
            visitedAt: new Date().toISOString(),
            date: today,
            isUnique: isUniqueToday
          });

          if (statSnap.exists) {
            const d = statSnap.data();
            const updateData = {
              total: (d.total || 0) + 1,
              [userType]: (d[userType] || 0) + 1,
              updatedAt: new Date().toISOString()
            };
            if (isUniqueToday) {
              updateData.unique = (d.unique || 0) + 1;
              updateData[`unique_${userType}`] = (d[`unique_${userType}`] || 0) + 1;
              updateData.devices = [...(d.devices || []), deviceId];
            }
            await statRef.update(updateData);
          } else {
            await statRef.set({
              date: today, total: 1, unique: 1,
              [userType]: 1, [`unique_${userType}`]: 1,
              devices: [deviceId],
              updatedAt: new Date().toISOString()
            });
          }
        } catch(e) {}
      },

    // 현재 날짜 (한국 시간 기준)
    const getTodayKST = () => {
      const now = new Date();
      // KST = UTC+9, 날짜 비교용으로 시간 제거
      const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
      return new Date(kst.toISOString().slice(0, 10));
    };
    const TODAY = getTodayKST();
    
    const calculateDday = (deadline) => {
      if (!deadline || deadline === "상시" || deadline === "수시" || deadline === "연중상시") return null;
      // 다양한 날짜 포맷 처리: "2025.12.31", "2025-12-31", "2025년 12월 31일"
      let normalized = deadline
        .replace(/년\s*/g, '-').replace(/월\s*/g, '-').replace(/일/g, '')
        .replace(/\./g, '-').trim();
      // "2025-12-31 18:00" → "2025-12-31"
      normalized = normalized.split(' ')[0];
      const deadlineDate = new Date(normalized);
      if (isNaN(deadlineDate.getTime())) return null;
      const diffTime = deadlineDate - TODAY;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      return diffDays;

    const LoadingSpinner = ({ text = "로딩중..." }) => (

        <div className="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mb-6 shadow-2xl"><span className="text-slate-800 font-bold text-2xl">KFI</span></div>
        <div className="w-8 h-8 border-4 border-slate-600 border-t-white rounded-full animate-spin mb-4"></div>
        <p className="text-slate-400">{text}</p>
      </div>
    );

    const LiveBadge = () => (<span className="inline-flex items-center gap-1 px-2 py-0.5 bg-red-500 text-white text-xs font-bold rounded-full live-badge"><span className="w-1.5 h-1.5 bg-white rounded-full"></span>LIVE</span>);

    const getDdayText = (dday) => {
      if (dday === null) return "상시";
      if (dday < 0) return "마감";
      if (dday === 0) return "D-Day";
      return `D-${dday}`;
    };
    const getDdayColor = (dday) => { 
      if (dday === null) return "bg-blue-100 text-blue-700"; 
      if (dday < 0) return "bg-gray-200 text-gray-500";
      if (dday <= 3) return "bg-red-100 text-red-600"; 
      if (dday <= 7) return "bg-amber-100 text-amber-600"; 
      return "bg-green-100 text-green-600"; 
    };
    const getStatusBadge = (status, dday) => { 
      if (status === 'closed' || (dday !== null && dday < 0)) return { text: "마감", class: "bg-gray-200 text-gray-500" };
      const badges = { 
        open: { text: "접수중", class: "bg-emerald-100 text-emerald-700" }, 
        upcoming: { text: "접수예정", class: "bg-blue-100 text-blue-700" }, 
        always: { text: "상시", class: "bg-purple-100 text-purple-700" }, 
        submitted: { text: "접수완료", class: "bg-blue-100 text-blue-700" }, 
        reviewing: { text: "심사중", class: "bg-amber-100 text-amber-700" }, 
        approved: { text: "승인", class: "bg-emerald-100 text-emerald-700" }, 
        rejected: { text: "반려", class: "bg-red-100 text-red-700" } 
      }; 
      return badges[status] || badges.closed; 
    };
    const getCategoryColor = (category) => { 
      const colors = { 
        "국내사업": "bg-blue-50 text-blue-700", 
        "해외사업": "bg-green-50 text-green-700", 
        "정보제공": "bg-indigo-50 text-indigo-700" 
      }; 
      return colors[category] || "bg-gray-50 text-gray-700"; 
    };
    const getFirebaseErrorMessage = (errorCode) => { 
      const messages = { 
        'auth/email-already-in-use': '이미 사용중인 이메일입니다.', 
        'auth/invalid-email': '유효하지 않은 이메일입니다.', 
        'auth/weak-password': '비밀번호는 6자 이상이어야 합니다.', 
        'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않습니다.' 
      }; 
      return messages[errorCode] || '오류가 발생했습니다.'; 
    };

    // === 검색 입력 컴포넌트 (로컬 state와 부모 state 완전 분리 - 타이핑 버그 방지) ===
    const AppSearchBar = ({ onQueryChange, resetKey }) => {
      const [val, setVal] = React.useState('');

      // 초기화(resetKey 변경) 시에만 val 리셋
      React.useEffect(() => {
        setVal('');
        onQueryChange('');
      }, [resetKey]);

      // val 변경 시 300ms 디바운스로 부모 업데이트 (타이핑 중 리렌더 차단)
      React.useEffect(() => {
        const timer = setTimeout(() => {
          onQueryChange(val.trim());
        }, 300);
        return () => clearTimeout(timer);
      }, [val]);

      return (
        <div className="flex gap-2">
          <div className="relative flex-1">
            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
              <Icon name="search" className="w-5 h-5" />
            </div>
            <input
              type="text"
              enterKeyHint="search"
              placeholder="검색어를 입력하세요"
              value={val}
              onChange={e => setVal(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') { onQueryChange(val.trim()); } }}
              className="w-full pl-10 pr-10 py-3 rounded-xl bg-white text-slate-900 placeholder-slate-400 text-sm border-0 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
            {val && (
              <button type="button"
                onClick={() => { setVal(''); onQueryChange(''); }}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                <Icon name="x" className="w-4 h-4" />
              </button>
            )}
          </div>
          <button type="button" onClick={() => onQueryChange(val.trim())}
            className="px-4 py-3 bg-slate-700 hover:bg-slate-600 active:bg-slate-800 rounded-xl text-white flex-shrink-0">
            <Icon name="search" className="w-5 h-5" />
          </button>
        </div>
      );
    };  // ← AppSearchBar 닫기 (누락된 괄호 복구)

    // ── ProgramEditForm: 독립 컴포넌트 (로컬 state → 타이핑 버그 없음) ──
    const ProgramEditForm = ({ initial, onSave, onCancel }) => {
      const inp = (field, fallback='') => initial ? (initial[field] ?? fallback) : fallback;

      const [title,       setTitle]       = useState(inp('title'));
      const [category,    setCategory]    = useState(inp('category','국내사업'));
      const [subcategory, setSubcategory] = useState(inp('subcategory'));
      const [status,      setStatus]      = useState(inp('status','open'));
      const [amount,      setAmount]      = useState(inp('amount'));
      const [openDate,    setOpenDate]    = useState(inp('openDate'));
      const [deadline,    setDeadline]    = useState(inp('deadline','2026-09-30'));
      const [description, setDescription]= useState(inp('description'));
      const [target,      setTarget]      = useState(inp('target'));
      const [applyUrl,    setApplyUrl]    = useState(inp('applyUrl'));
      const [contactDept, setContactDept] = useState(inp('contact','')?.dept ?? '산업진흥센터');
      const [contactPhone,setContactPhone]= useState(inp('contact','')?.phone ?? '031-289-0000');
      const [contactEmail,setContactEmail]= useState(inp('contact','')?.email ?? '');
      const [details,     setDetails]     = useState(initial?.details?.length ? initial.details : [{ item:'', value:'' }]);
      const [documents,   setDocuments]   = useState(initial?.documents?.length ? initial.documents : ['']);
      const [saving,      setSaving]      = useState(false);

      const ic = 'w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400';

      const handleSave = async () => {
        const data = {
          title, category, subcategory, status, amount, openDate, deadline,
          description, target, applyUrl,
          contact: { dept: contactDept, phone: contactPhone, email: contactEmail },
          details: details.filter(d => d.item.trim() || d.value.trim()),
          documents: documents.filter(d => d.trim()),
        };
        setSaving(true);
        await onSave(data);
        setSaving(false);
      };

      return (
        <div className="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-4">
          <h4 className="font-bold mb-3 text-slate-800">{initial ? `✏️ "${initial.title}" 수정` : '➕ 신규 사업 추가'}</h4>
          <div className="space-y-2">
            <p className="text-xs font-bold text-slate-500 mt-2">기본 정보</p>
            <input placeholder="사업명 *" value={title} onChange={e=>setTitle(e.target.value)} className={ic} />
            <select value={category} onChange={e=>setCategory(e.target.value)} className={ic}>
              <option>국내사업</option><option>해외사업</option><option>정보제공</option>
            </select>
            <input placeholder="세부분류 (예: 특허, 해외인증)" value={subcategory} onChange={e=>setSubcategory(e.target.value)} className={ic} />
            <select value={status} onChange={e=>setStatus(e.target.value)} className={ic}>
              <option value="open">접수중</option>
              <option value="always">상시</option>
              <option value="upcoming">접수예정</option>
              <option value="closed">마감</option>
            </select>
            <input placeholder="공고 시작일 (예: 2026-01-01)" value={openDate} onChange={e=>setOpenDate(e.target.value)} className={ic} />
            <input placeholder="접수 마감일 (예: 2026-09-30 또는 상시)" value={deadline} onChange={e=>setDeadline(e.target.value)} className={ic} />

            <p className="text-xs font-bold text-slate-500 mt-2">지원 내용</p>
            <input placeholder="지원금액 (예: 최대 500만원)" value={amount} onChange={e=>setAmount(e.target.value)} className={ic} />
            <textarea placeholder="사업 설명" value={description} onChange={e=>setDescription(e.target.value)} rows="3" className={ic} />
            <textarea placeholder="지원대상" value={target} onChange={e=>setTarget(e.target.value)} rows="2" className={ic} />

            <p className="text-xs font-bold text-slate-500 mt-2">지원 상세 항목 (항목명 / 내용)</p>
            {details.map((d, i) => (
              <div key={i} className="flex gap-1">
                <input placeholder="항목명" value={d.item} onChange={e=>{ const n=[...details]; n[i]={...n[i],item:e.target.value}; setDetails(n); }} className="border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 flex-1" />
                <input placeholder="내용" value={d.value} onChange={e=>{ const n=[...details]; n[i]={...n[i],value:e.target.value}; setDetails(n); }} className="border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 flex-1" />
                <button type="button" onClick={()=>setDetails(details.filter((_,j)=>j!==i))} className="px-2 text-red-400 text-lg">×</button>
              </div>
            ))}
            <button type="button" onClick={()=>setDetails([...details,{item:'',value:''}])} className="text-xs text-blue-600 font-semibold">+ 항목 추가</button>

            <p className="text-xs font-bold text-slate-500 mt-2">제출 서류</p>
            {documents.map((d, i) => (
              <div key={i} className="flex gap-1">
                <input placeholder="서류명" value={d} onChange={e=>{ const n=[...documents]; n[i]=e.target.value; setDocuments(n); }} className="border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 flex-1" />
                <button type="button" onClick={()=>setDocuments(documents.filter((_,j)=>j!==i))} className="px-2 text-red-400 text-lg">×</button>
              </div>
            ))}
            <button type="button" onClick={()=>setDocuments([...documents,''])} className="text-xs text-blue-600 font-semibold">+ 서류 추가</button>

            <p className="text-xs font-bold text-slate-500 mt-2">문의처</p>
            <input placeholder="부서명 (예: 산업진흥센터)" value={contactDept} onChange={e=>setContactDept(e.target.value)} className={ic} />
            <input placeholder="전화번호 (예: 031-289-0000)" value={contactPhone} onChange={e=>setContactPhone(e.target.value)} className={ic} />
            <input placeholder="이메일" value={contactEmail} onChange={e=>setContactEmail(e.target.value)} className={ic} />

            <p className="text-xs font-bold text-slate-500 mt-2">신청 URL</p>
            <input placeholder="신청 URL (https://...)" value={applyUrl} onChange={e=>setApplyUrl(e.target.value)} className={ic} />
          </div>
          <div className="flex gap-2 mt-4">
            <button type="button" onClick={onCancel} className="flex-1 py-3 rounded-xl bg-slate-200 text-sm font-semibold text-slate-700">취소</button>
            <button type="button" onClick={handleSave} disabled={saving} className="flex-1 py-3 rounded-xl bg-slate-800 text-white text-sm font-semibold disabled:opacity-50">
              {saving ? '저장중...' : initial ? '수정 저장' : '추가 저장'}
            </button>
          </div>
        </div>
      );
    };

    function App() {
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [userType, setUserType] = useState(null); // null | 'general' | 'manufacturer' | 'admin'
      const [isAdmin, setIsAdmin] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [showAdminLogin, setShowAdminLogin] = useState(false);
      const [programs, setPrograms] = useState(window.defaultPrograms || []);
      const [exhibitions, setExhibitions] = useState([]);
      const [allUsers, setAllUsers] = useState([]);
      const [userApplications, setUserApplications] = useState([]);
      const [allApplications, setAllApplications] = useState([]);
      const [visitStats, setVisitStats] = useState([]);
      const [bookmarks, setBookmarks] = useState([]);
      const [notifications, setNotifications] = useState([]);
      const [currentPage, setCurrentPage] = useState('home');
      const [selectedProgram, setSelectedProgram] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchBarKey, setSearchBarKey] = useState(0);
      const clearSearch = React.useCallback(() => { setSearchQuery(''); setSearchBarKey(k => k+1); }, []);
      const [selectedCategory, setSelectedCategory] = useState('전체');
      const [activeModal, setActiveModal] = useState(null);
      const [reviewModal, setReviewModal] = useState(null);
      const [adminFilter, setAdminFilter] = useState('전체');
      const [statusFilter, setStatusFilter] = useState('전체');
      const [showNotifications, setShowNotifications] = useState(false);
      const [showPreferences, setShowPreferences] = useState(false);
      const [userPreferences, setUserPreferences] = useState({ targetTags: [], subcategories: [] });
      const [refreshing, setRefreshing] = useState(false);
      const [showSplash, setShowSplash] = useState(true);
      const [showChatbot, setShowChatbot] = useState(false);
      const [chatMessages, setChatMessages] = useState([
        { role: 'bot', text: '안녕하세요! KFI 지원사업 챗봇입니다. 무엇을 도와드릴까요?' }
      ]);
      const [programsLoading, setProgramsLoading] = useState(false);
      // 사업관리 폼 상태 - App 최상위에서 관리 (탭 전환 시 초기화 방지)
      const [showProgramForm, setShowProgramForm] = useState(false);
      const [editProg, setEditProg] = useState(null);
      const [adminTab, setAdminTab] = useState('dashboard');
      const [notificationsEnabled, setNotificationsEnabled] = useState(() => {
        try { return localStorage.getItem('kfi_notif_enabled') !== 'false'; } catch { return true; }
      });
      const [dismissedNotifs, setDismissedNotifs] = useState(() => {
        try { return JSON.parse(localStorage.getItem('kfi_dismissed_notifs') || '[]'); } catch { return []; }
      });
      const [showExhibitionForm, setShowExhibitionForm] = useState(false);
      const [editExhibition, setEditExhibition] = useState(null);

      useEffect(() => { const h = () => setFirebaseReady(true); window.addEventListener('firebaseReady', h); if (window.firebaseAPI) setFirebaseReady(true); return () => window.removeEventListener('firebaseReady', h); }, []);

      // 검색 쿼리는 AppSearchBar에서 직접 setSearchQuery 호출

      // 관리자 Firebase 인증 상태
      useEffect(() => {
        if (!firebaseReady) return;
        return window.firebaseAPI.onAuthChange(async (user) => {
          if (user) {

      useEffect(() => {
        if (!programs.length || !notificationsEnabled) { setNotifications([]); return; }

          const dday = calculateDday(p.deadline);
          if (dday !== null && dday >= 0 && dday <= 7) {
            const id = `deadline-${p.id}-${p.deadline}`;
            if (!dismissedNotifs.includes(id)) {
              notifs.push({ id, type: 'deadline', title: dday === 0 ? '오늘 마감!' : `마감 ${dday}일 전`, message: p.title, programId: p.id, createdAt: new Date().toISOString() });

          }

        const recentNew = programs.filter(p => {
          if (p.status !== 'open' || !p.openDate) return false;
          const openDate = new Date(p.openDate);
          const diffDays = Math.floor((TODAY - openDate) / (1000*60*60*24));
          return diffDays >= 0 && diffDays <= 7;
        }).slice(0, 3);
        recentNew.forEach(p => {
          const id = `new-${p.id}-${p.openDate}`;

        setNotifications(notifs);

        }));

            p.title,

            p.description,

          ].filter(Boolean).join(' ').toLowerCase();

          const matchesCategory = selectedCategory === '전체' || p.category === selectedCategory;

          if (!window._touchStartY) return;
          const delta = e.touches[0].clientY - window._touchStartY;
          if (delta > 0) setPullY(Math.min(delta, THRESHOLD + 20));
        };
        const handleTouchEnd = async () => {
          if (pullY >= THRESHOLD && !refreshing) { await handleRefresh(); }
          setPullY(0);
          window._touchStartY = null;
        };
        const pullProgress = Math.min(pullY / THRESHOLD, 1);

        return (
          <div className="pb-24 px-4 py-4 animate-fade-in" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
            {/* 당기기 인디케이터 (개선5) */}

                <div className={`w-5 h-5 border-2 rounded-full transition-all ${pullProgress >= 1 ? 'border-blue-500 border-t-transparent animate-spin' : 'border-slate-300'}`} />

                        // 2. 현재 HTML을 DOM에서 직접 읽기 (fetch 불필요)

                        );

            <svg className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-28 h-28" viewBox="0 0 24 24">
              <path fill="#ef4444" d="M12 23c-3.9 0-7-3.1-7-7 0-2.8 1.6-5.2 3.1-6.8.5-.5 1.4-.2 1.4.5v1.5c0 .6.4 1 1 1s1-.4 1-1V3c0-.6.5-1 1-1s1 .4 1 1v5c0 .6.4 1 1 1s1-.4 1-1V7c0-.7.9-1 1.4-.5C18.4 8.8 19 11.2 19 14c0 3.9-3.1 7-7 7z"/>
              <path fill="#fbbf24" d="M12 21c-2.2 0-4-1.8-4-4 0-1.6.9-3 1.8-3.9.3-.3.8-.1.8.3v.9c0 .3.2.6.6.6.3 0 .6-.2.6-.6V9c0-.3.3-.6.6-.6s.6.2.6.6v2.9c0 .3.2.6.6.6.3 0 .6-.2.6-.6v-1.5c0-.4.5-.6.8-.3.9.9 1.4 2.3 1.4 3.9 0 2.2-1.8 4-4 4z"/>
            </svg>
            
            {/* 회색 톱니바퀴 - 오른쪽 */}
            <svg className="absolute right-0 top-4 w-16 h-16 text-slate-400 opacity-70" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66Z"/>
            </svg>
          </div>
          
          {/* 시작하기 버튼 */}
          <button type="button" onClick={() => setShowSplash(false)} className="flex items-center gap-2 text-white text-lg font-medium animate-pulse">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
            시작하기
          </button>
        </div>
      );

      // 챗봇 모달
      const ChatbotModal = () => {
        const chatContainerRef = React.useRef(null);
        const modalRef = React.useRef(null);
        const hasAnimated = React.useRef(false);
        
        useEffect(() => {
          // 애니메이션 완료 후 클래스 제거
          if (showChatbot && modalRef.current && !hasAnimated.current) {
            const timer = setTimeout(() => {
              if (modalRef.current) {
                modalRef.current.style.animation = 'none';
                modalRef.current.style.transform = 'translateY(0)';
                modalRef.current.style.opacity = '1';
              }
              hasAnimated.current = true;
            }, 350);
            return () => clearTimeout(timer);
          }
        }, [showChatbot]);
        
        useEffect(() => {
          // 모달이 닫힐 때 애니메이션 상태 리셋
          if (!showChatbot) {
            hasAnimated.current = false;
          }
        }, [showChatbot]);
        
        useEffect(() => {
          // 부모 컨테이너 내에서만 스크롤 (setTimeout으로 DOM 업데이트 후 실행)
          if (chatContainerRef.current) {
            setTimeout(() => {
              if (chatContainerRef.current) {
                chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
              }
            }, 10);
          }
        }, [chatMessages]);
        
        if (!showChatbot) return null;

        const handleQuickQuestion = (q) => {
          setChatMessages(prev => [...prev, { role: 'user', text: q }]);
          setTimeout(() => {
            let response = '죄송합니다. 해당 질문에 대한 답변을 찾지 못했습니다.';
            for (const [keyword, answer] of Object.entries(chatbotResponses)) {
              if (q.includes(keyword)) { response = answer; break; }
            }
            setChatMessages(prev => [...prev, { role: 'bot', text: response }]);
          }, 500);
        };

        return (
          <div className="fixed inset-0 bg-black/50 z-50 flex items-end justify-center" onClick={() => setShowChatbot(false)}>
            <div 
              ref={modalRef}
              className="bg-white w-full max-w-lg h-[70vh] rounded-t-3xl overflow-hidden flex flex-col animate-slide-up"
              onClick={e => e.stopPropagation()}
            >
              {/* 헤더 */}
              <div className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-4 flex justify-between items-center">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <Icon name="messageCircle" className="w-5 h-5" />
                  </div>
                  <div>
                    <h2 className="font-bold">KFI 지원사업 챗봇</h2>
                    <p className="text-xs text-blue-100">무엇이든 물어보세요</p>
                  </div>
                </div>
                <button type="button" onClick={() => setShowChatbot(false)} className="p-2"><Icon name="x" className="w-5 h-5" /></button>
              </div>
              
              {/* 메시지 영역 */}
              <div ref={chatContainerRef} className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                {chatMessages.map((msg, i) => (
                  <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                    <div className={`max-w-[80%] rounded-2xl px-4 py-3 ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-white text-slate-800 rounded-bl-sm shadow-sm'}`}>
                      <p className="text-sm leading-relaxed">{msg.text}</p>
                    </div>
                  </div>
                ))}
              </div>
              
              {/* 빠른 질문 버튼 */}
              <div className="px-4 py-3 bg-slate-50 border-t flex gap-2 overflow-x-auto hide-scrollbar">
                {['특허 지원', '해외 진출', '신청 방법', '문의처'].map(q => (
                  <button type="button" key={q} onClick={() => handleQuickQuestion(q)} className="px-4 py-2 bg-white border border-slate-200 hover:bg-slate-100 active:bg-slate-200 rounded-full text-xs font-medium text-slate-700 whitespace-nowrap transition-colors shadow-sm">{q}</button>
                ))}
              </div>
              
              {/* 입력 영역 */}
              <div className="p-3 bg-white border-t flex gap-2 items-end">
                <input 
                  id="chatInputField"
                  type="text"
                  enterKeyHint="send"
                  defaultValue=""
                  onKeyDown={e => {
                    if (e.key === 'Enter' && !e.nativeEvent.isComposing) {
                      e.preventDefault();
                      const input = e.target;
                      const msg = input.value.trim();
                      if (msg) {
                        setChatMessages(prev => [...prev, { role: 'user', text: msg }]);
                        input.value = '';
                        setTimeout(() => {
                          let response = '죄송합니다. 해당 질문에 대한 답변을 찾지 못했습니다. "도움"을 입력하시면 사용 가능한 키워드를 안내해드립니다.';
                          for (const [keyword, answer] of Object.entries(chatbotResponses)) {
                            if (msg.includes(keyword)) { response = answer; break; }
                          }
                          setChatMessages(prev => [...prev, { role: 'bot', text: response }]);
                        }, 500);
                      }
                    }
                  }}
                  placeholder="질문을 입력하세요..." 
                  className="flex-1 px-4 py-3 bg-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 border-0"
                />
                <button type="button" onClick={() => {
                  const input = document.getElementById('chatInputField');
                  const msg = input?.value?.trim();
                  if (msg) {
                    setChatMessages(prev => [...prev, { role: 'user', text: msg }]);
                    input.value = '';
                    setTimeout(() => {
                      let response = '죄송합니다. 해당 질문에 대한 답변을 찾지 못했습니다. "도움"을 입력하시면 사용 가능한 키워드를 안내해드립니다.';
                      for (const [keyword, answer] of Object.entries(chatbotResponses)) {
                        if (msg.includes(keyword)) { response = answer; break; }
                      }
                      setChatMessages(prev => [...prev, { role: 'bot', text: response }]);
                    }, 500);
                  }
                }} className="w-11 h-11 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white rounded-full flex items-center justify-center transition-colors shadow-md">
                  <Icon name="send" className="w-5 h-5" />
                </button>
              </div>
            </div>
          </div>
        );
      };

      // 챗봇 FAB 버튼
      const ChatbotFAB = () => (
        <button 
          type="button"
          onClick={(e) => { e.preventDefault(); e.stopPropagation(); setShowChatbot(true); }} 
          className="fixed right-4 bottom-28 w-14 h-14 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-full shadow-xl flex items-center justify-center z-40 active:scale-95 transition-all hover:shadow-2xl"
          style={{ boxShadow: '0 4px 20px rgba(79, 70, 229, 0.4)' }}
        >
          <Icon name="messageCircle" className="w-7 h-7" />
        </button>
      );

      // 스플래시 화면 표시
      if (showSplash) return <SplashScreen />;

      if (!userType) return <UserTypeSelectPage />;

      return (
        <div className="min-h-screen bg-slate-100">
          <Header />
          <NotificationPanel />
          <main>
            {currentPage === 'home' && (isAdmin ? <AdminDashboard /> : <HomePage />)}
            {currentPage === 'calendar' && <CalendarPage />}
            {currentPage === 'mypage' && <MyPage />}
          </main>
          <BottomNav />
          <ChatbotFAB />
          <DetailModal />
          <MyPageModal />
          <ReviewModal />
          <PreferencesModal />
          <ChatbotModal />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>


</body></html>
